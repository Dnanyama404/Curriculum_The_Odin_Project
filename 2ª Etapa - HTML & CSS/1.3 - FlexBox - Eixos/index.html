<!DOCTYPE html>
<html lang="pt-Br">

<head>
    <title>Aula de FlexBox</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/estilo.css">
</head>

<body>
    <h1 class="title"> Terceira aula de FlexBox - Eixos.</h1>
    <p class="paragrafo">Eixo principal "Horizontal": <br> - Ou seja, da esquerda para a direira.</p>
    <div class="flex-conteiner">
        <div class="um">
            <p class="paragrafo"> Div 1.</p>
        </div>
        <div class="dois">
            <p class="paragrafo"> Div 2.</p>
        </div>
        <div class="três">
            <p class="paragrafo"> Div 3.</p>
        </div>
    </div>

    <p class="paragrafo">Segundo Eixo "Vertical": <br> - Ou seja, De cima para baixo.</p>
    <div id="flex-conteiner">
        <div class="um">
            <p class="paragrafo"> Div 1.</p>
        </div>
        <div class="dois">
            <p class="paragrafo"> Div 2.</p>
        </div>
        <div class="três">
            <p class="paragrafo"> Div 3.</p>
        </div>
    </div>


</body>

</html>
