<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pedra, Papel e Tesoura</title>
    <link rel="stylesheet" href="style.css" />
</head>

<body>
    <div class="game-shell">
        <header class="header">
            <h1 class="title">Pedra, Papel e Tesoura</h1>
            <p class="subtitle">By: <strong>Fulano404 - Dorany Nanyama,,</strong></p>


        </header>

        <div class="panel">
            <div class="panel-inner">
                <!-- Imagem interativa (decorativa + flutuação) -->
                <div class="decoration" aria-hidden="true">
                    <img src="data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='900'%20height='320'%20viewBox='0%200%20900%20320'%3E%3Cdefs%3E%3CradialGradient%20id='g'%20cx='20%25'%20cy='20%25'%20r='80%25'%3E%3Cstop%20offset='0'%20stop-color='%2345a3ff'%20stop-opacity='.85'/%3E%3Cstop%20offset='.5'%20stop-color='%232dd4bf'%20stop-opacity='.35'/%3E%3Cstop%20offset='1'%20stop-color='%23071a3a'%20stop-opacity='1'/%3E%3C/radialGradient%3E%3C/defs%3E%3Crect%20width='900'%20height='320'%20fill='url(%23g)'/%3E%3Cpath%20d='M0%20210%20C120%20160%20240%20280%20360%20230%20S600%20180%20720%20210%20S860%20270%20900%20230%20L900%20320%20L0%20320%20Z'%20fill='rgba(255,255,255,0.08)'/%3E%3Ctext%20x='50%25'%20y='52%25'%20dominant-baseline='middle'%20text-anchor='middle'%20font-size='34'%20fill='rgba(255,255,255,0.9)'%20font-family='Arial'%3EEscolha%20para%20jogar!%3C/text%3E%3C/svg%3E"
                        alt="" />
                </div>
                <!-- Mensagem a cada rodada.-->
                <p id="turn" class="message" style="min-height: 22px;">Sua vez!</p>

                <section class="choices-row" aria-label="Escolha do jogador">
                    <button type="button" class="choice-btn choice" data-choice="Pedra">
                        <span class="choice-emoji">🪨</span>Pedra
                    </button>
                    <button type="button" class="choice-btn choice" data-choice="Papel">
                        <span class="choice-emoji">📄</span>Papel
                    </button>
                    <button type="button" class="choice-btn choice" data-choice="Tesoura">
                        <span class="choice-emoji">✂️</span>Tesoura
                    </button>
                </section>

                <section class="score-row" aria-label="Placar e rodada">
                    <div class="score-box">
                        <h3>Rodada</h3>
                        <div class="score-value"><span id="round">1</span>/5</div>
                    </div>
                    <div class="score-box">
                        <h3>Placar</h3>
                        <div class="score-value"><span id="scoreHumana">0</span> x <span id="scoreComputador">0</span></div>
                    </div>
                </section>

                <p id="message" class="message" aria-live="polite"></p>

                <div class="footer-row">
                    <button type="button" id="reset" class="action-btn">Reiniciar jogo</button>
                </div>
            </div>
        </div>
    </div>


    <script src="JavaScript.js"></script>
</body>

</html>
